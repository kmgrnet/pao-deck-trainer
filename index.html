<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>е…„ејҹ OAOT и®°еҝҶи®ӯз»ғеҷЁ - 4иҠұиүІз»ҲжһҒзүҲ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-6xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-center mb-8 flex items-center justify-center gap-3">
      <i class="fas fa-brain text-yellow-400"></i> е…„ејҹ OAOT и®°еҝҶи®ӯз»ғеҷЁпјҲ4иҠұиүІз»ҲжһҒзүҲпјү
    </h1>

    <div class="flex justify-center gap-4 mb-8 flex-wrap">
      <button onclick="showTab(0)" class="tab-btn active px-6 py-2 rounded-full bg-yellow-400 text-black font-medium">еҚ•еј з»ғд№ </button>
      <button onclick="showTab(2)" class="tab-btn px-6 py-2 rounded-full hover:bg-zinc-800">4еј иҝһй”Ғ</button>
      <button onclick="showTab(1)" class="tab-btn px-6 py-2 rounded-full hover:bg-zinc-800">е®Ңж•ҙжҳ е°„иЎЁ</button>
    </div>

    <!-- еҚ•еј з»ғд№  -->
    <div id="tab0" class="tab">
      <div class="bg-zinc-900 p-8 rounded-3xl text-center">
        <div id="card" class="text-8xl font-bold mb-8 text-yellow-400">зӮ№еҮ»жҠҪзүҢ</div>
        <button onclick="drawSingle()" class="w-full bg-yellow-400 hover:bg-yellow-300 text-black font-bold text-2xl py-6 rounded-3xl mb-6">рҹҺҙ жҠҪдёҖеј зүҢ</button>
        
        <div id="answerSingle" class="hidden bg-zinc-800 p-6 rounded-3xl text-left space-y-4">
          <div class="grid grid-cols-2 gap-4 text-lg">
            <div><span class="text-yellow-400">иҠұиүІпјҡ</span><span id="suitDisplaySingle" class="font-bold"></span></div>
            <div><span class="text-yellow-400">зүҢзӮ№пјҡ</span><span id="rankDisplaySingle"></span></div>
            <div><span class="text-yellow-400">еҪўиұЎпјҡ</span><span id="personSingle"></span></div>
            <div><span class="text-yellow-400">еҠЁдҪңпјҡ</span><span id="actionSingle"></span></div>
            <div><span class="text-yellow-400">зү©дҪ“пјҡ</span><span id="o2Single"></span></div>
            <div><span class="text-yellow-400">ең°зӮ№пјҡ</span><span id="locSingle"></span></div>
          </div>
        </div>

        <div class="flex gap-4 mt-6">
          <button onclick="showSingleAnswer()" id="showBtnSingle" class="hidden flex-1 bg-green-500 hover:bg-green-400 text-black font-bold py-4 rounded-3xl">рҹ‘Җ жҳҫзӨәзӯ”жЎҲ</button>
          <button onclick="shareToWeChat()" id="shareBtnSingle" class="hidden flex-1 bg-blue-500 hover:bg-blue-400 text-white font-bold py-4 rounded-3xl">рҹ“Ө еҲҶдә«еҲ°еҫ®дҝЎ</button>
        </div>
      </div>
    </div>

    <!-- 4еј иҝһй”Ғ -->
    <div id="tab2" class="tab hidden">
      <div class="bg-zinc-900 p-8 rounded-3xl">
        <button onclick="drawFourCards()" class="w-full bg-yellow-400 hover:bg-yellow-300 text-black font-bold text-2xl py-6 rounded-3xl mb-8">рҹҺҙрҹҺҙрҹҺҙрҹҺҙ жҠҪ4еј иҝһй”ҒзүҢ</button>
        <div class="grid grid-cols-4 gap-4 mb-8" id="fourCards"></div>
        
        <div class="flex gap-4">
          <button onclick="showFourAnswer()" id="showBtnFour" class="hidden flex-1 bg-green-500 hover:bg-green-400 text-black font-bold py-5 rounded-3xl text-xl">рҹ‘Җ жҳҫзӨәиҝһй”Ғзӯ”жЎҲ</button>
          <button onclick="shareToWeChat()" id="shareBtnFour" class="hidden flex-1 bg-blue-500 hover:bg-blue-400 text-white font-bold py-5 rounded-3xl text-xl">рҹ“Ө еҲҶдә«еҲ°еҫ®дҝЎ</button>
        </div>

        <div id="fourAnswer" class="hidden mt-6 bg-zinc-800 p-6 rounded-3xl text-xl leading-relaxed text-center">
          <span id="chainResult" class="text-yellow-400 font-bold"></span>
        </div>
      </div>
    </div>

    <!-- е®Ңж•ҙжҳ е°„иЎЁ -->
    <div id="tab1" class="tab hidden">
      <div class="bg-zinc-800 p-4 rounded-t-3xl">
        <input id="searchInput" type="text" 
               class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4 text-lg focus:outline-none focus:border-yellow-400"
               placeholder="рҹ”Қ жҗңзҙўеҪўиұЎгҖҒеҠЁдҪңгҖҒзү©дҪ“гҖҒең°зӮ№гҖҒж•…дәӢ...">
      </div>
      <div class="bg-zinc-900 rounded-b-3xl overflow-x-auto">
        <table class="w-full text-left min-w-[1300px]">
          <thead class="bg-zinc-800 sticky top-0">
            <tr>
              <th class="p-4">иҠұиүІ</th>
              <th class="p-4">зүҢ</th>
              <th class="p-4">еҪўиұЎ</th>
              <th class="p-4">еҠЁдҪң</th>
              <th class="p-4">зү©дҪ“</th>
              <th class="p-4">ең°зӮ№</th>
              <th class="p-4 w-[420px]">е®Ңж•ҙж•…дәӢ</th>
            </tr>
          </thead>
          <tbody id="tableBody" class="text-sm"></tbody>
        </table>
      </div>
    </div>

    <div class="text-center mt-8 text-zinc-400">
      е·Із»ғд№  <span id="count" class="text-yellow-400 font-bold">0</span> ж¬Ў
    </div>
  </div>

  <!-- еҫ®дҝЎеҲҶдә«жЁЎжҖҒжЎҶ -->
  <div id="shareModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl max-w-sm w-full mx-4 p-8 text-center">
      <h2 class="text-2xl font-bold mb-6">еҲҶдә«еҲ°еҫ®дҝЎ</h2>
      <div id="qrCode" class="mx-auto bg-white p-4 rounded-2xl inline-block mb-6"></div>
      <div class="bg-zinc-800 rounded-2xl p-4 mb-6 text-left text-sm">
        <div class="font-medium mb-2">жҺЁиҚҗж–ҮжЎҲпјҲе·ІеӨҚеҲ¶пјү</div>
        <div id="shareText" class="text-zinc-300 leading-relaxed"></div>
      </div>
      <div class="flex gap-4">
        <button onclick="copyShareText()" class="flex-1 bg-yellow-400 hover:bg-yellow-300 text-black font-bold py-4 rounded-2xl">рҹ“Ӣ еӨҚеҲ¶ж–ҮжЎҲ</button>
        <button onclick="closeShareModal()" class="flex-1 bg-zinc-700 hover:bg-zinc-600 font-bold py-4 rounded-2xl">е…ій—ӯ</button>
      </div>
    </div>
  </div>

  <script>
    const ranks = ['A','2','3','4','5','6','7','8','9','T','J','Q','K'];
    const suits = ['вҷҘ','вҷҰ','вҷЈ','вҷ '];
    const suitColors = {'вҷҘ':'text-red-500','вҷҰ':'text-red-500','вҷЈ':'text-black','вҷ ':'text-black'};

    const oaotData = {
      'вҷҘ': { persons: ['йі„йұј','еҸҢиғһиғҺ','е’Ңе°ҡ','й—№й’ҹ','дәҢиғЎ','жІіжөҒ','иҖіжңә','жҒ¶йңё','йҳҝиғ¶','йҰҷзғҹ','е…ізҫҪ','еҘ¶еҘ¶','еӯҷжӮҹз©ә'], actions: ['е’¬дҪҸ','жӢҘжҠұ','иҜөз»Ҹ','е“Қиө·','жӢүеҘҸ','еҘ”жөҒ','ж’ӯж”ҫ','ж•ҷи®ӯ','зҶ¬еҲ¶','зӮ№зҮғ','жҢҘиҲһ','з…§йЎҫ','зҝ»зӯӢж–—'], o2s: ['йёЎи…ҝ','ж°”зҗғ','жңЁйұј','й“ғй“ӣ','еј“ејҰ','з«№зӯҸ','йҹід№җ','жЈҚеӯҗ','жұӨиҚҜ','зғҹзҒ°зјё','йқ’йҫҷеҒғжңҲеҲҖ','иў«еӯҗ','йҮ‘з®ҚжЈ’'], locs: ['жІјжіҪең°','жёёд№җеӣӯ','еҸӨеәҷ','еәҠеӨҙ','иҲһеҸ°','й•ҝжұҹиҫ№','ең°й“Ғ','е°Ҹе··','дёӯиҚҜеә—','йҳіеҸ°','дёүеӣҪжҲҳеңә','ж‘ҮжӨ…иҫ№','иҠұжһңеұұ'] },
      'вҷҰ': { persons: ['ж–Ҝд»Ә','жҹҝеӯҗ','зҹіеӨҙеұұ','иӣҮ','еёҲеӮ…','йҘІж–ҷ','еҸёжңә','зҹіжқҝ','еӨ©е®үй—Ё','еҸёд»Ө','иҜёи‘ӣдә®','еҰҲеҰҲ','жІҷе’Ңе°ҡ'], actions: ['йһ иә¬','ж‘ҳдёӢ','ж”ҖзҲ¬','еҗҗдҝЎ','ж•ҷеҜј','ж’’дёӢ','ејҖиҪҰ','еҲ»еӯ—','еҚҮж——','дёӢд»Ө','ж‘ҮжүҮ','з…®йҘӯ','жҢ‘жӢ…'], o2s: ['зӨјеёҪ','з«№зҜ®','з»ізҙў','иҖҒйј ','з»Ҹд№Ұ','йёЎзҫӨ','ж–№еҗ‘зӣҳ','еҮҝеӯҗ','еӣҪж——','еҶӣж——','зҫҪжүҮ','еӣҙиЈҷ','жүҒжӢ…'], locs: ['зӨје Ӯ','жһңеӣӯ','еұұйЎ¶','иҚүдёӣ','еҜәеәҷ','еҶңеңә','е…¬и·Ҝ','еҸӨиҝ№','еҢ—дә¬е№ҝеңә','жҢҮжҢҘйғЁ','иҚүеәҗ','еҺЁжҲҝ','еҸ–з»Ҹи·Ҝ'] },
      'вҷЈ': { persons: ['йІЁйұј','жүҮе„ҝ','жҳҹжҳҹ','дёқеёҰ','еұұиҷҺ','еұұйә“','еұұйёЎ','еҰҮеҘі','еұұдёҳ','дёүиҪ®иҪҰ','еј йЈһ','зҲёзҲё','зҢӘе…«жҲ’'], actions: ['ж’•е’¬','жүҮйЈҺ','й—ӘзғҒ','зі»дёҠ','е’Ҷе“®','ж”Җзҷ»','жү“йёЈ','з»Үеёғ','зҝ»ж»ҡ','йӘ‘иЎҢ','е–қйҶү','жҠҪзғҹ','еҗғиҘҝз“ң'], o2s: ['йұјйҘө','и’ІжүҮ','жңӣиҝңй•ң','зӨјзү©зӣ’','зҲӘеҚ°','зҷ»еұұжқ–','йёЎеҶ ','й’Ҳзәҝ','йҮҺиҠұ','й“ғй“ӣ','дёҲе…«иӣҮзҹӣ','зғҹж–—','й’үиҖҷ'], locs: ['еӨ§жө·','еӨҸеӨңеҮүдәӯ','еӨңз©ә','з”ҹж—ҘжҙҫеҜ№','еұұжһ—','еұұи„ҡ','еҶңе®¶йҷў','иҖҒеұӢ','дёҳйҷө','иҖҒиЎ—','жЎғеӣӯ','д№ҰжҲҝ','й«ҳиҖҒеә„'] },
      'вҷ ': { persons: ['жўҜеӯҗ','жӨ…еӯҗ','еҢ»з”ҹ','й’ҘеҢҷ','й№Ұй№ү','зҹіжҰҙ','жҳҫеҫ®й•ң','и…°еҢ…','иҚҜй…’','жЈ’зҗғ','еҲҳеӨҮ','зҲ·зҲ·','е”җеғ§'], actions: ['зҲ¬дёҠ','еқҗдёӢ','еҗ¬иҜҠ','жү“ејҖ','иҜҙиҜқ','з ёејҖ','еҜ№з„Ұ','зі»дёҠ','ж‘Үжҷғ','жҠ•еҮә','з»Үеёӯ','и®ІеҸӨ','еҸ–з»Ҹ'], o2s: ['жІ№жјҶжЎ¶','жһ•еӨҙ','дҪ“жё©и®Ў','еӨ§й—Ё','з“ңеӯҗ','зәўзұҪ','зҺ»зүҮ','зЎ¬еёҒ','й…’еЈ¶','жүӢеҘ—','иҚүйһӢ','иҢ¶еЈ¶','з»Ҹд№Ұ'], locs: ['еұӢйЎ¶','е®ўеҺ…','иҜҠжүҖ','е®¶й—ЁеҸЈ','йёҹз¬ј','жһңеӣӯ','е®һйӘҢе®Ө','и…°й—ҙ','иҚҜеә—','жЈ’зҗғеңә','жЎғеӣӯ','е ӮеұӢ','иҘҝеӨ©и·Ҝ'] }
    };

    let practiceCount = parseInt(localStorage.getItem('oaotCount')) || 0;
    let currentSingle = null;
    let currentFour = null;
    const siteUrl = window.location.href;
    const shareTextBase = `е…„ејҹпјҢжҲ‘еңЁз”ЁиҝҷдёӘи¶…ејәOAOTи®°еҝҶи®ӯз»ғеҷЁпјҒ4иҠұиүІ52еј е…ЁиҮӘе®ҡд№ү+е®Ңж•ҙж•…дәӢ+иҜӯйҹіжң—иҜ»пјҢи¶…еҘҪи®°пјҒеҝ«жқҘз»ғпјҡ${siteUrl}`;

    function updateCount() {
      document.getElementById('count').textContent = practiceCount;
      localStorage.setItem('oaotCount', practiceCount);
    }

    // иҮӘеҠЁиҜӯйҹіжң—иҜ»пјҲдёӯж–Үпјү
    function speak(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 1.0;
        utterance.pitch = 1.0;
        window.speechSynthesis.speak(utterance);
      }
    }

    // еҚ•еј з»ғд№ 
    function drawSingle() {
      const rankIdx = Math.floor(Math.random() * 13);
      const suitIdx = Math.floor(Math.random() * 4);
      const suit = suits[suitIdx];
      currentSingle = { suit, rank: ranks[rankIdx], rankIdx, data: oaotData[suit] };
      document.getElementById('card').innerHTML = `${currentSingle.rank}<span class="${suitColors[suit]} text-7xl">${suit}</span>`;
      document.getElementById('answerSingle').classList.add('hidden');
      document.getElementById('showBtnSingle').classList.remove('hidden');
      document.getElementById('shareBtnSingle').classList.add('hidden');
    }

    function showSingleAnswer() {
      if (!currentSingle) return;
      const d = currentSingle.data;
      const idx = currentSingle.rankIdx;
      document.getElementById('suitDisplaySingle').innerHTML = `<span class="${suitColors[currentSingle.suit]}">${currentSingle.suit}</span>`;
      document.getElementById('rankDisplaySingle').textContent = currentSingle.rank;
      document.getElementById('personSingle').textContent = d.persons[idx];
      document.getElementById('actionSingle').textContent = d.actions[idx];
      document.getElementById('o2Single').textContent = d.o2s[idx];
      document.getElementById('locSingle').textContent = d.locs[idx];
      document.getElementById('answerSingle').classList.remove('hidden');
      document.getElementById('showBtnSingle').classList.add('hidden');
      document.getElementById('shareBtnSingle').classList.remove('hidden');

      // иҮӘеҠЁжң—иҜ»е®Ңж•ҙж•…дәӢ
      const story = `${d.persons[idx]}${d.actions[idx]}${d.o2s[idx]}пјҢеңЁ${d.locs[idx]}гҖӮ`;
      speak(story);

      practiceCount++;
      updateCount();
    }

    // 4еј иҝһй”Ғ
    function drawFourCards() {
      const allCards = [];
      const used = new Set();
      while (allCards.length < 4) {
        const rIdx = Math.floor(Math.random() * 13);
        const sIdx = Math.floor(Math.random() * 4);
        const suit = suits[sIdx];
        const rank = ranks[rIdx];
        const key = suit + rank;
        if (!used.has(key)) {
          used.add(key);
          const data = oaotData[suit];
          allCards.push({suit, rank, rankIdx: rIdx, person: data.persons[rIdx], action: data.actions[rIdx], o2: data.o2s[rIdx], loc: data.locs[rIdx]});
        }
      }
      currentFour = allCards;
      let html = '';
      allCards.forEach((c, i) => {
        html += `<div class="bg-zinc-800 rounded-2xl p-4 text-center"><div class="text-5xl font-bold ${suitColors[c.suit]}">${c.rank}<span class="text-4xl">${c.suit}</span></div><div class="text-xs text-zinc-500 mt-2">з¬¬${i+1}еј </div></div>`;
      });
      document.getElementById('fourCards').innerHTML = html;
      document.getElementById('showBtnFour').classList.remove('hidden');
      document.getElementById('shareBtnFour').classList.add('hidden');
      document.getElementById('fourAnswer').classList.add('hidden');
    }

    function showFourAnswer() {
      if (!currentFour) return;
      const result = `${currentFour[0].person} ${currentFour[1].action} ${currentFour[2].o2} ${currentFour[3].loc}`;
      document.getElementById('chainResult').textContent = result;
      document.getElementById('fourAnswer').classList.remove('hidden');
      document.getElementById('showBtnFour').classList.add('hidden');
      document.getElementById('shareBtnFour').classList.remove('hidden');

      // иҮӘеҠЁжң—иҜ»иҝһй”Ғзӯ”жЎҲ
      speak(result);

      practiceCount++;
      updateCount();
    }

    // жёІжҹ“жҳ е°„иЎЁпјҲ52еј е®Ңж•ҙж•…дәӢпјү
    function renderTable() {
      let html = '';
      suits.forEach(suit => {
        const data = oaotData[suit];
        ranks.forEach((r, i) => {
          const p = data.persons[i];
          const a = data.actions[i];
          const o = data.o2s[i];
          const l = data.locs[i];
          const story = `${p}${a}${o}пјҢеңЁ${l}гҖӮ`;
          html += `<tr class="border-t border-zinc-700 hover:bg-zinc-800">
            <td class="p-4"><span class="${suitColors[suit]} text-xl">${suit}</span></td>
            <td class="p-4 font-bold">${r}</td>
            <td class="p-4">${p}</td>
            <td class="p-4">${a}</td>
            <td class="p-4">${o}</td>
            <td class="p-4">${l}</td>
            <td class="p-4 text-emerald-300">${story}</td>
          </tr>`;
        });
      });
      document.getElementById('tableBody').innerHTML = html;
    }

    function setupSearch() {
      const input = document.getElementById('searchInput');
      input.addEventListener('input', () => {
        const term = input.value.toLowerCase().trim();
        const rows = document.querySelectorAll('#tableBody tr');
        rows.forEach(row => {
          const text = row.textContent.toLowerCase();
          row.style.display = term === '' || text.includes(term) ? '' : 'none';
        });
      });
    }

    function shareToWeChat() {
      const modal = document.getElementById('shareModal');
      modal.classList.remove('hidden');
      const qrDiv = document.getElementById('qrCode');
      qrDiv.innerHTML = '';
      new QRCode(qrDiv, {text: siteUrl, width: 220, height: 220});
      document.getElementById('shareText').textContent = shareTextBase;
      navigator.clipboard.writeText(shareTextBase);
    }

    function copyShareText() {
      navigator.clipboard.writeText(shareTextBase);
      alert('вң… ж–ҮжЎҲе·ІеӨҚеҲ¶пјҢеҝ«еҸ‘з»ҷе…„ејҹд»¬дёҖиө·з»ғпјҒ');
    }

    function closeShareModal() {
      document.getElementById('shareModal').classList.add('hidden');
    }

    function showTab(n) {
      document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
      document.getElementById('tab' + n).classList.remove('hidden');
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('onclick').includes(n));
        btn.classList.toggle('bg-yellow-400', btn.getAttribute('onclick').includes(n));
        btn.classList.toggle('text-black', btn.getAttribute('onclick').includes(n));
      });
      if (n === 1) renderTable();
    }

    // еҲқе§ӢеҢ–
    showTab(0);
    updateCount();
    setupSearch();
  </script>
</body>
</html>
