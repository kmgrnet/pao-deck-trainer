<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>兄弟 OAOT 记忆训练器 - 4花色终极版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-4xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-center mb-8 flex items-center justify-center gap-3">
      <i class="fas fa-brain text-yellow-400"></i> 兄弟 OAOT 记忆训练器（4花色终极版）
    </h1>

    <div class="flex justify-center gap-4 mb-8 flex-wrap">
      <button onclick="showTab(0)" class="tab-btn active px-6 py-2 rounded-full bg-yellow-400 text-black font-medium">练习模式</button>
      <button onclick="showTab(1)" class="tab-btn px-6 py-2 rounded-full hover:bg-zinc-800">完整映射表</button>
    </div>

    <!-- 练习 Tab -->
    <div id="tab0" class="tab">
      <div class="bg-zinc-900 p-8 rounded-3xl text-center">
        <div id="card" class="text-8xl font-bold mb-8 text-yellow-400">点击抽牌</div>
        <button onclick="drawCard()" 
                class="w-full bg-yellow-400 hover:bg-yellow-300 text-black font-bold text-2xl py-6 rounded-3xl mb-6">
          🎴 抽一张牌
        </button>
        
        <div id="answer" class="hidden bg-zinc-800 p-6 rounded-3xl text-left space-y-4">
          <div class="grid grid-cols-2 gap-4 text-lg">
            <div><span class="text-yellow-400">花色：</span><span id="suitDisplay" class="font-bold"></span></div>
            <div><span class="text-yellow-400">牌点：</span><span id="rankDisplay"></span></div>
            <div><span class="text-yellow-400">形象：</span><span id="person" class="font-medium"></span></div>
            <div><span class="text-yellow-400">动作：</span><span id="action"></span></div>
            <div><span class="text-yellow-400">物体：</span><span id="o2"></span></div>
            <div><span class="text-yellow-400">地点：</span><span id="loc"></span></div>
          </div>
        </div>

        <button onclick="showAnswer()" id="showBtn"
                class="hidden mt-4 w-full bg-green-500 hover:bg-green-400 text-black font-bold py-4 rounded-3xl">
          👀 显示 OAOT 答案
        </button>
      </div>
      
      <div class="text-center mt-6 text-zinc-400">
        已练习 <span id="count" class="text-yellow-400 font-bold">0</span> 次
      </div>
    </div>

    <!-- 映射表 Tab -->
    <div id="tab1" class="tab hidden">
      <div class="bg-zinc-900 rounded-3xl overflow-hidden">
        <table class="w-full text-left">
          <thead class="bg-zinc-800 sticky top-0">
            <tr>
              <th class="p-4">花色</th>
              <th class="p-4">牌</th>
              <th class="p-4">形象</th>
              <th class="p-4">动作</th>
              <th class="p-4">物体</th>
              <th class="p-4">地点</th>
            </tr>
          </thead>
          <tbody id="tableBody" class="text-sm"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const ranks = ['A','2','3','4','5','6','7','8','9','T','J','Q','K'];
    const suits = ['♥','♦','♣','♠'];
    const suitColors = {'♥':'text-red-500','♦':'text-red-500','♣':'text-black','♠':'text-black'};

    // 4花色完整独立OAOT数据（精准按照你提供的）
    const oaotData = {
      '♥': {  // 红桃 - 鳄鱼系列
        persons: ['鳄鱼','双胞胎','和尚','闹钟','二胡','河流','耳机','恶霸','阿胶','香烟','关羽','奶奶','孙悟空'],
        actions: ['咬住','拥抱','诵经','响起','拉奏','奔流','播放','教训','熬制','点燃','挥舞','照顾','翻筋斗'],
        o2s: ['鸡腿','气球','木鱼','铃铛','弓弦','竹筏','音乐','棍子','汤药','烟灰缸','青龙偃月刀','被子','金箍棒'],
        locs: ['沼泽地','游乐园','古庙','床头','舞台','长江边','地铁','小巷','中药店','阳台','三国战场','摇椅边','花果山']
      },
      '♦': {  // 方块 - 斯仪系列
        persons: ['斯仪','柿子','石头山','蛇','师傅','饲料','司机','石板','天安门','司令','诸葛亮','妈妈','沙和尚'],
        actions: ['鞠躬','摘下','攀爬','吐信','教导','撒下','开车','刻字','升旗','下令','摇扇','煮饭','挑担'],
        o2s: ['礼帽','竹篮','绳索','老鼠','经书','鸡群','方向盘','凿子','国旗','军旗','羽扇','围裙','扁担'],
        locs: ['礼堂','果园','山顶','草丛','寺庙','农场','公路','古迹','北京广场','指挥部','草庐','厨房','取经路']
      },
      '♣': {  // 梅花 - 鲨鱼系列
        persons: ['鲨鱼','扇儿','星星','丝带','山虎','山麓','山鸡','妇女','山丘','三轮车','张飞','爸爸','猪八戒'],
        actions: ['撕咬','扇风','闪烁','系上','咆哮','攀登','打鸣','织布','翻滚','骑行','喝醉','抽烟','吃西瓜'],
        o2s: ['鱼饵','蒲扇','望远镜','礼物盒','爪印','登山杖','鸡冠','针线','野花','铃铛','丈八蛇矛','烟斗','钉耙'],
        locs: ['大海','夏夜凉亭','夜空','生日派对','山林','山脚','农家院','老屋','丘陵','老街','桃园','书房','高老庄']
      },
      '♠': {  // 黑桃 - 梯子系列
        persons: ['梯子','椅子','医生','钥匙','鹦鹉','石榴','显微镜','腰包','药酒','棒球','刘备','爷爷','唐僧'],
        actions: ['爬上','坐下','听诊','打开','说话','砸开','对焦','系上','摇晃','投出','织席','讲古','取经'],
        o2s: ['油漆桶','枕头','体温计','大门','瓜子','红籽','玻片','硬币','酒壶','手套','草鞋','茶壶','经书'],
        locs: ['屋顶','客厅','诊所','家门口','鸟笼','果园','实验室','腰间','药店','棒球场','桃园','堂屋','西天路']
      }
    };

    let practiceCount = parseInt(localStorage.getItem('oaotCount')) || 0;
    let currentCard = null;

    function updateCount() {
      document.getElementById('count').textContent = practiceCount;
      localStorage.setItem('oaotCount', practiceCount);
    }

    function drawCard() {
      const rankIdx = Math.floor(Math.random() * 13);
      const suitIdx = Math.floor(Math.random() * 4);
      const suit = suits[suitIdx];
      const data = oaotData[suit];

      currentCard = {
        suit, rank: ranks[rankIdx], rankIdx,
        person: data.persons[rankIdx],
        action: data.actions[rankIdx],
        o2: data.o2s[rankIdx],
        loc: data.locs[rankIdx]
      };
      
      document.getElementById('card').innerHTML = 
        `${currentCard.rank}<span class="${suitColors[suit]} text-7xl">${suit}</span>`;
      
      document.getElementById('answer').classList.add('hidden');
      document.getElementById('showBtn').classList.remove('hidden');
    }

    function showAnswer() {
      if (!currentCard) return;
      document.getElementById('suitDisplay').innerHTML = 
        `<span class="${suitColors[currentCard.suit]}">${currentCard.suit}</span>`;
      document.getElementById('rankDisplay').textContent = currentCard.rank;
      document.getElementById('person').textContent = currentCard.person;
      document.getElementById('action').textContent = currentCard.action;
      document.getElementById('o2').textContent = currentCard.o2;
      document.getElementById('loc').textContent = currentCard.loc;
      
      document.getElementById('answer').classList.remove('hidden');
      document.getElementById('showBtn').classList.add('hidden');
      
      practiceCount++;
      updateCount();
    }

    function showTab(n) {
      document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
      document.getElementById('tab' + n).classList.remove('hidden');
      
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === n);
        if (i === n) btn.classList.add('bg-yellow-400','text-black');
        else btn.classList.remove('bg-yellow-400','text-black');
      });
      
      if (n === 1) renderTable();
    }

    function renderTable() {
      let html = '';
      suits.forEach(suit => {
        const data = oaotData[suit];
        ranks.forEach((r, i) => {
          html += `<tr class="border-t border-zinc-700 hover:bg-zinc-800">
            <td class="p-4"><span class="${suitColors[suit]} text-xl">${suit}</span></td>
            <td class="p-4 font-bold">${r}</td>
            <td class="p-4">${data.persons[i]}</td>
            <td class="p-4">${data.actions[i]}</td>
            <td class="p-4">${data.o2s[i]}</td>
            <td class="p-4">${data.locs[i]}</td>
          </tr>`;
        });
      });
      document.getElementById('tableBody').innerHTML = html;
    }

    // 初始化
    showTab(0);
    updateCount();
  </script>
</body>
</html>
